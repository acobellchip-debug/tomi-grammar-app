<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓国語文法演習アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700&family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-light: #e3f2fd;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f8f9fa;
            --card-outline: #e0e0e0;
            --text-color: #333;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 500px;
            background-color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
        }

        /* Header */
        header {
            padding: 20px;
            background-color: var(--white);
            border-bottom: 1px solid var(--card-outline);
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            margin-right: 10px;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* View Container */
        .view {
            padding: 20px;
            flex-grow: 1;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Top Page & Menus */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .menu-item {
            background: var(--white);
            border: 1px solid var(--card-outline);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .menu-item:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .btn-outline {
            background-color: var(--white);
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Explanation Page */
        .explanation-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .bubble {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
        }

        .korean-text {
            font-family: 'Gothic A1', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(74, 144, 226, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .korean-text:hover {
            background: rgba(74, 144, 226, 0.2);
        }

        .korean-text::after {
            content: '🔊';
            font-size: 0.9rem;
        }

        .translation {
            font-size: 1.1rem;
            color: var(--secondary-color);
            margin-top: 5px;
        }

        .rule-card {
            background: var(--primary-light);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .vocab-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--card-outline);
        }

        /* Quiz Page */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 18px;
            border: 2px solid var(--card-outline);
            border-radius: 12px;
            background: var(--white);
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
        }

        .option-btn.correct {
            background-color: var(--success-color);
            color: var(--white);
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color);
            color: var(--white);
            border-color: var(--error-color);
        }

        /* Score Page */
        .score-container {
            text-align: center;
            padding: 40px 0;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        /* Utility */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="app-header">
            <button class="back-btn" id="global-back-btn" onclick="app.goBack()">←</button>
            <h1 id="header-title">韓国語演習</h1>
        </header>

        <!-- View: Top Menu -->
        <main id="view-top" class="view active">
            <h2>学習する回を選んでください</h2>
            <ul class="menu-list">
                <li class="menu-item" onclick="app.goToRound(2)">
                    <span>第2回：自己紹介しよう！</span>
                    <span>→</span>
                </li>
                <li class="menu-item" onclick="app.goToRound(3)">
                    <span>第3回：[こそあど言葉]と[이/가]・[아닙니다]</span>
                    <span>→</span>
                </li>
                <li class="menu-item" onclick="app.goToRound(4)">
                    <span>第4回：ですます文！[습니다]と[하고]</span>
                    <span>→</span>
                </li>
            </ul>
        </main>

        <!-- View: Round Menu -->
        <main id="view-round-menu" class="view">
            <h2 id="round-title">タイトル</h2>
            <div class="menu-list">
                <button class="btn btn-outline" onclick="app.goToExplanation()">💡 解説を読む</button>
                <button class="btn btn-primary" onclick="app.startQuiz()">📝 練習問題を解く</button>
            </div>
        </main>

        <!-- View: Explanation -->
        <main id="view-explanation" class="view">
            <div id="explanation-content">
                <!-- Data injected here -->
            </div>
        </main>

        <!-- View: Quiz -->
        <main id="view-quiz" class="view">
            <div class="quiz-header">
                <span id="quiz-progress">問題 1 / 10</span>
                <span id="quiz-score">正解数: 0</span>
            </div>
            <div class="question-text" id="question-text">質問文</div>
            <div class="options-list" id="options-list">
                <!-- Options injected here -->
            </div>
            <div id="quiz-feedback" style="margin-top: 20px; font-weight: 700; text-align: center; min-height: 1.5em;">
            </div>
            <button class="btn btn-primary hidden" id="next-question-btn" onclick="app.nextQuestion()">次の問題へ</button>
        </main>

        <!-- View: Score -->
        <main id="view-score" class="view">
            <div class="score-container">
                <h2>お疲れ様でした！</h2>
                <div class="score-circle">
                    <span class="score-value" id="final-score">0</span>
                    <span style="font-size: 0.9rem;">点 / 100</span>
                </div>
                <p id="score-message">素晴らしいですね！</p>
                <button class="btn btn-primary" onclick="app.goToView('top')">トップページへ戻る</button>
            </div>
        </main>
    </div>

    <script>

                            title: "解説1：회화（会話）",
                            items: [
                                { ko: "토미 씨, 남자 친구 있습니까?", ja: "トミさん、彼氏いますか？" },
                                { ko: "아뇨. 저는 남자 친구 없습니다.", ja: "いいえ。私は彼氏いません。" },
                                { ko: "그럼 휴일에는 보통 뭐 합니까?", ja: "それなら、休日には普通何しますか？" },
                                { ko: "저는 요리하고 도서관에 갑니다.", ja: "私は料理をして、図書館に行きます。" },
                                { ko: "도서관까지 혼자 걸어갑니까?", ja: "図書館まで一人で歩いて行きますか？" },
                                { ko: "아뇨. 버스 타고 갑니다.", ja: "いいえ。バスに乗っていきます。" }
                            ]
                        },
                        {
                            type: "grammar",
                            title: "解説2：ㅂ니다/습니다（〜です・ます）",
                            rule: "動詞・形容詞の다を取って\n・パッチムあり → 습니다\n・パッチムなし → ㅂ니다\n・ㄹパッチム → ㄹが脱落してㅂ니다",
                            examples: [
                                { ko: "있다 → 있습니다", ja: "います・あります" },
                                { ko: "없다 → 없습니다", ja: "いません・ありません" },
                                { ko: "먹다 → 먹습니다", ja: "食べます" },
                                { ko: "하다 → 합니다", ja: "します" },
                                { ko: "가다 → 갑니다", ja: "行きます" },
                                { ko: "걸어가다 → 걸어갑니다", ja: "歩いて行きます" },
                                { ko: "놀다 → 놉니다", ja: "遊びます ※ㄹ脱落" },
                                { ko: "알다 → 압니다", ja: "知っています ※ㄹ脱落" },
                                { ko: "사랑하다 → 사랑합니다", ja: "愛します" },
                                { ko: "달다 → 답니다", ja: "甘いです ※ㄹ脱落" }
                            ]
                        },
                        {
                            type: "grammar",
                            title: "解説3：고（〜て・〜で）",
                            rule: "動詞・形容詞の다をとって고をつける\n2つ以上の動作をつなげる表現",
                            examples: [
                                { ko: "저는 요리하고 도서관에 갑니다.", ja: "私は料理して図書館に行きます" },
                                { ko: "버스 타고 갑니다.", ja: "バスに乗って行きます" },
                                { ko: "먹고 마시고 놀고", ja: "食べて飲んで遊んで" },
                                { ko: "웃고 화내고 울고", ja: "笑って怒って泣いて" }
                            ]
                        },
                        {
                            type: "vocabulary",
                            title: "語彙リスト",
                            items: [
                                { ko: "남자", ja: "男性" },
                                { ko: "여자", ja: "女性" },
                                { ko: "친구", ja: "友達" },
                                { ko: "남자 친구", ja: "彼氏" },
                                { ko: "여자 친구", ja: "彼女" },
                                { ko: "있다", ja: "ある・いる" },
                                { ko: "없다", ja: "ない・いない" },
                                { ko: "휴일", ja: "休日" },
                                { ko: "보통", ja: "普通" },
                                { ko: "요리", ja: "料理" },
                                { ko: "도서관", ja: "図書館" },
                                { ko: "하다", ja: "する" },
                                { ko: "가다", ja: "行く" },
                                { ko: "에", ja: "〜に" },
                                { ko: "에는", ja: "〜には" },
                                { ko: "에서", ja: "〜から・〜で" },
                                { ko: "까지", ja: "〜まで" },
                                { ko: "혼자", ja: "一人" }
                            ]
                        }
                    ],
                    quiz: [
                        { q: "있다のですます形は？", a: "있습니다", options: ["있습니다", "있ㅂ니다", "있니다", "읍니다"] },
                        { q: "하다のですます形は？", a: "합니다", options: ["합니다", "하습니다", "하ㅂ니다", "합다"] },
                        { q: "놀다のですます形は？", a: "놉니다", options: ["놉니다", "놀습니다", "놀ㅂ니다", "노습니다"] },
                        { q: "알다のですます形は？", a: "압니다", options: ["압니다", "알습니다", "알ㅂ니다", "아습니다"] },
                        { q: "먹다のですます形は？", a: "먹습니다", options: ["먹습니다", "먹ㅂ니다", "먹니다", "먹합니다"] },
                        { q: "「料理して図書館に行きます」を韓国語にすると？", a: "요리하고 도서관에 갑니다", options: ["요리하고 도서관에 갑니다", "요리해서 도서관에 갑니다", "요리하고 도서관에 합니다", "요리고 도서관에 갑니다"] },
                        { q: "「バスに乗って行きます」を韓国語にすると？", a: "버스 타고 갑니다", options: ["버스 타고 갑니다", "버스 타서 갑니다", "버스 타고 합니다", "버스 하고 갑니다"] },
                        { q: "「食べて飲んで遊んで」を韓国語にすると？", a: "먹고 마시고 놀고", options: ["먹고 마시고 놀고", "먹어서 마셔서 놀고", "먹하고 마시하고 놀하고", "먹고 마시고 놉니다"] },
                        { q: "「彼氏いますか？」を韓国語にすると？", a: "남자 친구 있습니까?", options: ["남자 친구 있습니까?", "남자 친구 없습니까?", "여자 친구 있습니까?", "남자 친구 있습니다"] },
                        { q: "「私は料理します」の「します」にあたる韓国語は？", a: "합니다", options: ["합니다", "하습니다", "하고", "합니까"] }
                    ]
                }
            }
        };

        const app = {
            currentView: 'top',
            viewHistory: [],
            currentRound: null,
            currentQuestionIdx: 0,
            score: 0,
            isAnswering: false,

            init() {
                this.updateBackButton();
            },

            // 選択肢をシャッフルするユーティリティメソッド
            shuffle(array) {
                const newArray = [...array];
                for (let i = newArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                }
                return newArray;
            },

            speak(text) {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'ko-KR';
                window.speechSynthesis.speak(uttr);
            },

            goToView(viewId, pushHistory = true) {
                if (pushHistory) this.viewHistory.push(this.currentView);

                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById('view-' + viewId).classList.add('active');
                this.currentView = viewId;
                this.updateBackButton();

                // Dynamic titles
                const titles = {
                    'top': '韓国語演習',
                    'round-menu': this.currentRound ? DATA.rounds[this.currentRound].title : '各回のメニュー',
                    'explanation': '文法解説',
                    'quiz': '練習問題',
                    'score': '結果発表'
                };
                document.getElementById('header-title').textContent = titles[viewId] || '韓国語演習';
            },

            goBack() {
                if (this.viewHistory.length > 0) {
                    const prevView = this.viewHistory.pop();
                    this.goToView(prevView, false);
                }
            },

            updateBackButton() {
                const btn = document.getElementById('global-back-btn');
                if (this.currentView === 'top') {
                    btn.style.visibility = 'hidden';
                } else {
                    btn.style.visibility = 'visible';
                }
            },

            goToRound(roundId) {
                this.currentRound = roundId;
                document.getElementById('round-title').textContent = DATA.rounds[roundId].title;
                this.goToView('round-menu');
            },

            goToExplanation() {
                const roundData = DATA.rounds[this.currentRound];
                const container = document.getElementById('explanation-content');
                container.innerHTML = '';

                roundData.explanations.forEach(section => {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'explanation-section';

                    let html = `<div class="section-title">${section.title}</div>`;

                    if (section.type === 'conversation') {
                        section.items.forEach(item => {
                            html += `
                                <div class="bubble">
                                    <div class="korean-text" onclick="app.speak('${item.ko}')">${item.ko}</div>
                                    <div class="translation">${item.ja}</div>
                                </div>
                            `;
                        });
                    } else if (section.type === 'grammar') {
                        html += `
                            <div class="rule-card">
                                <strong>ルール:</strong><br>${section.rule.replace(/\n/g, '<br>')}
                            </div>
                        `;
                        section.examples.forEach(ex => {
                            html += `
                                <div style="margin-bottom: 15px;">
                                    <div class="korean-text" onclick="app.speak('${ex.ko}')">${ex.ko}</div>
                                    <div class="translation">${ex.ja}</div>
                                </div>
                            `;
                        });
                    } else if (section.type === 'vocabulary') {
                        html += `<div class="vocab-grid">`;
                        section.items.forEach(vocab => {
                            html += `
                                <div class="vocab-item">
                                    <div class="korean-text" onclick="app.speak('${vocab.ko}')">${vocab.ko}</div>
                                    <span class="translation">${vocab.ja}</span>
                                </div>
                            `;
                        });
                        html += `</div>`;
                    }

                    sectionEl.innerHTML = html;
                    container.appendChild(sectionEl);
                });

                this.goToView('explanation');
            },

            startQuiz() {
                this.currentQuestionIdx = 0;
                this.score = 0;
                this.isAnswering = false;
                this.renderQuestion();
                this.goToView('quiz');
            },

            renderQuestion() {
                const roundData = DATA.rounds[this.currentRound];
                const qData = roundData.quiz[this.currentQuestionIdx];

                document.getElementById('quiz-progress').textContent = `問題 ${this.currentQuestionIdx + 1} / ${roundData.quiz.length}`;
                document.getElementById('quiz-score').textContent = `正解数: ${this.score}`;
                document.getElementById('question-text').textContent = qData.q;

                const optionsList = document.getElementById('options-list');
                optionsList.innerHTML = '';
                document.getElementById('quiz-feedback').textContent = '';
                document.getElementById('next-question-btn').classList.add('hidden');
                this.isAnswering = true;

                // 選択肢をコピーしてシャッフル
                const shuffledOptions = this.shuffle(qData.options);

                shuffledOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => this.checkAnswer(opt, btn);
                    optionsList.appendChild(btn);
                });
            },

            checkAnswer(selected, btn) {
                if (!this.isAnswering) return;
                this.isAnswering = false;

                const roundData = DATA.rounds[this.currentRound];
                const qData = roundData.quiz[this.currentQuestionIdx];
                const feedbackEl = document.getElementById('quiz-feedback');

                const allBtns = document.querySelectorAll('.option-btn');

                if (selected === qData.a) {
                    btn.classList.add('correct');
                    feedbackEl.textContent = '正解！✨';
                    feedbackEl.style.color = 'var(--success-color)';
                    this.score++;
                    this.speak(selected);
                } else {
                    btn.classList.add('wrong');
                    feedbackEl.textContent = `残念... 正解は「${qData.a}」でした。`;
                    feedbackEl.style.color = 'var(--error-color)';

                    // Highlight correct answer
                    allBtns.forEach(b => {
                        if (b.textContent === qData.a) b.classList.add('correct');
                    });
                }

                document.getElementById('next-question-btn').classList.remove('hidden');
            },

            nextQuestion() {
                const roundData = DATA.rounds[this.currentRound];
                this.currentQuestionIdx++;

                if (this.currentQuestionIdx < roundData.quiz.length) {
                    this.renderQuestion();
                } else {
                    this.showScore();
                }
            },

            showScore() {
                const roundData = DATA.rounds[this.currentRound];
                const totalQuestions = roundData.quiz.length;
                const finalScore = Math.round((this.score / totalQuestions) * 100);

                document.getElementById('final-score').textContent = finalScore;

                let message = "";
                if (finalScore === 100) message = "パーフェクト！素晴らしいです！🎊";
                else if (finalScore >= 80) message = "その調子です！合格点ですね！👍";
                else if (finalScore >= 60) message = "あともう少し！復習してみましょう。";
                else message = "まずは解説をもう一度読んでみましょう。";

                document.getElementById('score-message').textContent = message;
                this.goToView('score');
            }
        };

        window.onload = () => app.init();
    </script>
</body>
